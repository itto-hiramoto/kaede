<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Comment Server Slide Placeholder</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #fff;
        color: #111;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(0, 0, 0, 0.04), transparent 32%),
          #fff;
      }

      main {
        width: min(960px, calc(100vw - 96px));
        padding: 56px 64px;
        border: 2px solid #222;
        border-radius: 20px;
        box-sizing: border-box;
      }

      h1 {
        margin: 0 0 20px 0;
        font-size: 48px;
      }

      p {
        margin: 0;
        font-size: 28px;
        line-height: 1.6;
      }

      code {
        font-family: "SFMono-Regular", Consolas, monospace;
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Slide Placeholder</h1>
      <p>
        This file is a public dummy slide for the comment overlay example.
        Export your own slide HTML to
        <code>frontend/slides/private.html</code>
        and open
        <code>/screen?slides=/slides/private.html</code>.
      </p>
    </main>
  </body>
</html>
